<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nosso Amor 💖</title>

  <!-- Fonte bonita -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&family=Great+Vibes&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="app">

  <!-- HEADER -->
  <header>
    <h1>Nosso Amor</h1>
    <p>cada segundo com você é único 💖</p>
  </header>

  <!-- CONTADOR -->
  <section class="card destaque">
    <div id="contador"></div>
  </section>

  <!-- MURAL -->
  <section class="card">
    <h2>Memórias ✨</h2>

    <textarea id="textoMemoria" placeholder="Escreva um momento especial..."></textarea>
    <input type="file" id="imagemMemoria" accept="image/*">
    <button id="salvarMemoria">Salvar</button>

    <div id="feedMemorias"></div>
  </section>

  <!-- MENSAGENS -->
  <section class="card">
    <h2>Mensagens 💌</h2>

    <textarea id="novaMensagem" placeholder="Escreva algo especial..."></textarea>
    <button id="enviarMensagem">Enviar</button>

    <div id="listaMensagens"></div>
  </section>

</div>



<script src="js/scripts.js"></script>
</body>
</html>
