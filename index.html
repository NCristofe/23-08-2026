<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nosso Amor 💖</title>

  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="app">

  <!-- HEADER -->
  <header>
    <h1>Nosso Amor 💖</h1>
    <p id="usuarioLogado"></p>
  </header>

  <!-- CONTADOR -->
  <section class="card destaque">
    <div id="contador"></div>
  </section>

  <!-- CHAT -->
  <section class="card">
    <h2>Mensagens 💌</h2>

    <div id="chat"></div>

    <div class="input-area">
      <input type="text" id="mensagemInput" placeholder="Digite algo especial...">
      <button onclick="enviarMensagem()">Enviar</button>
    </div>
  </section>

  <button id="logout">Sair</button>

</div>

<script src="js/scripts.js"></script>
</body>
</html>
